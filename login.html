<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <!-- LifeSync Glass v1 -->
  <title>Log In — LifeSync</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#020B18;--cyan:#00D4FF;--teal:#0D9488;--white:#FFFFFF;--off-white:#E2EEF7;--muted:#6B8CA8;--glass:rgba(255,255,255,.04);--glass-border:rgba(255,255,255,.09);--glass-hover:rgba(255,255,255,.08);--red:#FF4D6A;}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--off-white);min-height:100vh;display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 90% 20%,rgba(0,212,255,.1) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 10% 80%,rgba(13,148,136,.08) 0%,transparent 60%);}
    *{position:relative;z-index:1;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 5%;background:rgba(2,11,24,.7);backdrop-filter:blur(24px);border-bottom:1px solid var(--glass-border);}
    .logo{font-weight:900;font-size:1.4rem;color:var(--white);text-decoration:none;letter-spacing:-1px;}
    .logo span{color:var(--cyan);}
    .nav-link{font-size:.88rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color .2s;}
    .nav-link:hover{color:var(--cyan);}
    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 5%;}
    .card{background:rgba(5,15,32,.8);backdrop-filter:blur(32px);border:1px solid var(--glass-border);border-radius:28px;padding:2.8rem 2.4rem;width:100%;max-width:440px;box-shadow:0 0 80px rgba(0,212,255,.06);}
    .card-title{font-size:1.9rem;font-weight:900;color:var(--white);letter-spacing:-1px;margin-bottom:.4rem;}
    .card-sub{font-size:.88rem;color:var(--muted);margin-bottom:1.8rem;}
    .card-sub a{color:var(--cyan);text-decoration:none;font-weight:700;}
    .demo-hint{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.15);border-radius:12px;padding:.75rem 1rem;font-size:.78rem;color:var(--cyan);margin-bottom:1.4rem;line-height:1.5;}
    .demo-hint strong{font-weight:800;}
    .alert-box{background:rgba(255,77,106,.08);border:1px solid rgba(255,77,106,.25);border-radius:12px;padding:.85rem 1rem;font-size:.82rem;color:var(--red);display:none;margin-bottom:1.2rem;align-items:center;gap:.5rem;}
    .alert-box.show{display:flex;}
    .form-group{margin-bottom:1.2rem;}
    label{display:block;font-size:.78rem;font-weight:700;color:var(--off-white);margin-bottom:.4rem;letter-spacing:.3px;}
    input{width:100%;padding:.75rem 1rem;background:rgba(255,255,255,.05);border:1px solid var(--glass-border);border-radius:12px;font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;}
    input::placeholder{color:var(--muted);}
    input:focus{border-color:rgba(0,212,255,.45);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
    input.error{border-color:var(--red);}
    .error-msg{font-size:.73rem;color:var(--red);margin-top:.3rem;display:none;}
    .error-msg.show{display:block;}
    .password-wrap{position:relative;}
    .password-wrap input{padding-right:2.8rem;}
    .toggle-pw{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:.9rem;}
    .forgot{display:block;text-align:right;font-size:.76rem;color:var(--cyan);text-decoration:none;font-weight:600;margin-top:.3rem;}
    .forgot:hover{text-decoration:underline;}
    .btn-submit{width:100%;background:linear-gradient(135deg,var(--cyan),var(--teal));color:var(--bg);border:none;padding:.9rem;border-radius:999px;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:opacity .2s,transform .15s;box-shadow:0 0 28px rgba(0,212,255,.3);margin-bottom:1rem;}
    .btn-submit:hover{opacity:.9;transform:translateY(-1px);}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .divider{display:flex;align-items:center;gap:1rem;margin:1rem 0;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--glass-border);}
    .divider span{font-size:.75rem;color:var(--muted);}
    .btn-google{width:100%;background:var(--glass);border:1px solid var(--glass-border);color:var(--off-white);padding:.85rem;border-radius:999px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;transition:background .2s;}
    .btn-google:hover{background:var(--glass-hover);}
    @media(max-width:480px){.card{padding:2rem 1.5rem;}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Life<span>Sync</span></a>
  <a href="signup.html" class="nav-link">New here? <strong>Start free trial</strong></a>
</nav>
<div class="page">
  <div class="card">
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">No account? <a href="signup.html">Start your 14-day free trial</a></p>
    <div class="demo-hint"><strong>Demo mode:</strong> Use any email + password (8+ chars) to log in and explore the dashboard.</div>
    <div class="alert-box" id="alert-box"><i class="fa-solid fa-circle-exclamation"></i><span id="alert-text"></span></div>
    <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@email.com"/><div class="error-msg" id="email-err">Enter a valid email</div></div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrap"><input type="password" id="password" placeholder="Your password"/><button class="toggle-pw" type="button" onclick="togglePw()"><i class="fa-solid fa-eye"></i></button></div>
      <div class="error-msg" id="pw-err">Password must be at least 8 characters</div>
      <a href="#" class="forgot" onclick="handleForgot(event)">Forgot password?</a>
    </div>
    <button class="btn-submit" id="login-btn" onclick="handleLogin()">Log In to LifeSync</button>
    <div class="divider"><span>or continue with</span></div>
    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
  </div>
</div>
<script>
  function togglePw(){ var inp=document.getElementById('password'); var btn=document.querySelector('.toggle-pw'); var isT=inp.type==='text'; inp.type=isT?'password':'text'; btn.innerHTML=isT?'<i class="fa-solid fa-eye"></i>':'<i class="fa-solid fa-eye-slash"></i>'; }
  function handleLogin(){ var email=document.getElementById('email').value; var pw=document.getElementById('password').value; var ok=true; if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){document.getElementById('email').classList.add('error');document.getElementById('email-err').classList.add('show');ok=false;}else{document.getElementById('email').classList.remove('error');document.getElementById('email-err').classList.remove('show');} if(pw.length<8){document.getElementById('password').classList.add('error');document.getElementById('pw-err').classList.add('show');ok=false;}else{document.getElementById('password').classList.remove('error');document.getElementById('pw-err').classList.remove('show');} if(!ok)return; var btn=document.getElementById('login-btn'); btn.textContent='Logging in...'; btn.disabled=true; setTimeout(function(){ var user=JSON.parse(localStorage.getItem('ls_user')||'null'); if(!user){user={name:email.split('@')[0],email:email,plan:'individual'};localStorage.setItem('ls_user',JSON.stringify(user));localStorage.setItem('ls_plan','individual');} window.location.href='dashboard.html'; },1000); }
  function handleForgot(e){ e.preventDefault(); var a=document.getElementById('alert-box'); document.getElementById('alert-text').textContent='Password reset would be sent to your email in the full version.'; a.classList.add('show'); setTimeout(function(){a.classList.remove('show');},3000); }
</script>
</body>
</html>
